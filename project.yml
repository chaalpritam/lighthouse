name: Lighthouse
options:
  bundleIdPrefix: com.blockbase
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Lighthouse:
    type: application
    platform: iOS
    sources:
      - path: Lighthouse
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blockbase.lighthouse
        INFOPLIST_GENERATION_MODE: Generated
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Lighthouse
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Lighthouse uses your location to geotag incidents and route SOS help near you.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Lighthouse needs the microphone so you can report emergencies by voice.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: Lighthouse converts your spoken reports into text for the offline agent.
        INFOPLIST_KEY_NSCameraUsageDescription: Lighthouse can attach field photos to incident reports.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Lighthouse can import field photos for OCR and incident records.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets: []
